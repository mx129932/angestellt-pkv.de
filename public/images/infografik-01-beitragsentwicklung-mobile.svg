<text x="34" y="462" fill="#9CA3AF" font-size="9" text-anchor="end">120</text>
<line x1="40" y1="387" x2="370" y2="387" stroke="#E5E7EB" stroke-width="0.6"/>
<text x="34" y="391" fill="#9CA3AF" font-size="9" text-anchor="end">140</text>
<line x1="40" y1="315" x2="370" y2="315" stroke="#E5E7EB" stroke-width="0.6"/>
<text x="34" y="319" fill="#9CA3AF" font-size="9" text-anchor="end">160</text>
<line x1="40" y1="244" x2="370" y2="244" stroke="#E5E7EB" stroke-width="0.6"/>
<text x="34" y="248" fill="#9CA3AF" font-size="9" text-anchor="end">180</text>
<line x1="40" y1="172" x2="370" y2="172" stroke="#E5E7EB" stroke-width="0.6"/>
<text x="34" y="176" fill="#9CA3AF" font-size="9" text-anchor="end">200</text>
<line x1="40" y1="101" x2="370" y2="101" stroke="#E5E7EB" stroke-width="0.6"/>
<text x="34" y="105" fill="#9CA3AF" font-size="9" text-anchor="end">220</text>

<!-- X axis -->
<text x="40" y="558" fill="#9CA3AF" font-size="10" font-weight="500" text-anchor="middle">2005</text>
<line x1="40" y1="101" x2="40" y2="545" stroke="#E5E7EB" stroke-width="0.5" stroke-dasharray="3,3"/>
<text x="122" y="558" fill="#9CA3AF" font-size="10" font-weight="500" text-anchor="middle">2010</text>
<line x1="122" y1="101" x2="122" y2="545" stroke="#E5E7EB" stroke-width="0.5" stroke-dasharray="3,3"/>
<text x="205" y="558" fill="#9CA3AF" font-size="10" font-weight="500" text-anchor="middle">2015</text>
<line x1="205" y1="101" x2="205" y2="545" stroke="#E5E7EB" stroke-width="0.5" stroke-dasharray="3,3"/>
<text x="288" y="558" fill="#9CA3AF" font-size="10" font-weight="500" text-anchor="middle">2020</text>
<line x1="288" y1="101" x2="288" y2="545" stroke="#E5E7EB" stroke-width="0.5" stroke-dasharray="3,3"/>
<text x="370" y="558" fill="#9CA3AF" font-size="10" font-weight="500" text-anchor="middle">2025</text>
<line x1="370" y1="101" x2="370" y2="545" stroke="#E5E7EB" stroke-width="0.5" stroke-dasharray="3,3"/>

<!-- Area fills -->
<path d="M40,530 L56,518 L73,505 L90,492 L106,479 L122,465 L139,450 L156,435 L172,420 L188,404 L205,387 L222,367 L238,345 L254,323 L271,299 L288,275 L304,250 L320,224 L337,196 L354,168 L370,138 L370,545 L40,545 Z" fill="url(#gkv-fill)"/>
<path d="M40,530 L56,522 L73,514 L90,505 L106,497 L122,488 L139,479 L156,470 L172,461 L188,451 L205,441 L222,424 L238,405 L254,386 L271,367 L288,346 L304,325 L320,303 L337,280 L354,256 L370,231 L370,545 L40,545 Z" fill="url(#pkv-fill)"/>

<!-- GKV line -->
<path d="M40,530 L56,518 L73,505 L90,492 L106,479 L122,465 L139,450 L156,435 L172,420 L188,404 L205,387 L222,367 L238,345 L254,323 L271,299 L288,275 L304,250 L320,224 L337,196 L354,168 L370,138" fill="none" stroke="#6B7280" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

<!-- PKV line -->
<path d="M40,530 L56,522 L73,514 L90,505 L106,497 L122,488 L139,479 L156,470 L172,461 L188,451 L205,441 L222,424 L238,405 L254,386 L271,367 L288,346 L304,325 L320,303 L337,280 L354,256 L370,231" fill="none" stroke="#D4A017" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

<!-- End dots -->
<circle cx="370" cy="138" r="4" fill="#6B7280" stroke="white" stroke-width="2"/>
<circle cx="370" cy="231" r="4" fill="#D4A017" stroke="white" stroke-width="2"/>

<!-- Rate labels – below chart -->
<rect x="30" y="585" width="160" height="44" rx="8" fill="#F0F1F3"/>
<text x="110" y="606" fill="#6B7280" font-size="12" font-weight="700" text-anchor="middle">GKV: ⌀ 3,8 %</text>
<text x="110" y="622" fill="#44474e" font-size="10" text-anchor="middle">pro Jahr</text>

<rect x="210" y="585" width="160" height="44" rx="8" fill="#FDF6E3"/>
<text x="290" y="606" fill="#B8860B" font-size="12" font-weight="700" text-anchor="middle">PKV: ⌀ 3,1 %</text>
<text x="290" y="622" fill="#44474e" font-size="10" text-anchor="middle">pro Jahr</text>

<!-- End values at line ends -->
<text x="362" y="128" fill="#6B7280" font-size="11" font-weight="700" text-anchor="end">209,3</text>
<text x="362" y="221" fill="#B8860B" font-size="11" font-weight="700" text-anchor="end">183,5</text>

<!-- Footer -->
<text x="30" y="660" fill="#9CA3AF" font-size="8">*ohne Bundeszuschuss</text>
<text x="30" y="672" fill="#9CA3AF" font-size="8">Quelle: WIP-Kurzanalyse 2024. 2024/2025 extrapoliert.</text>

</svg>