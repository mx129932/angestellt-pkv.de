<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 720" width="400" height="720">
<defs><style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap');
text { font-family: 'Inter', system-ui, sans-serif; }
</style></defs>
<rect width="400" height="720" rx="12" fill="#FFFFFF"/>
<text x="200" y="36" fill="#002046" font-size="18" font-weight="700" text-anchor="middle">Beitragsentwicklung PKV vs. GKV</text>
<text x="200" y="56" fill="#44474e" font-size="11" text-anchor="middle">Indexiert je Versicherten (2005 = 100)</text>

<defs>
  <linearGradient id="pkv-fill" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#D4A017" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#D4A017" stop-opacity="0.01"/>
  </linearGradient>
  <linearGradient id="gkv-fill" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#6B7280" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#6B7280" stop-opacity="0.01"/>
  </linearGradient>
  <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
    <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.06"/>
  </filter>
</defs>

<!-- Legend -->
<line x1="30" y1="76" x2="50" y2="76" stroke="#D4A017" stroke-width="2.5" stroke-linecap="round"/>
<text x="55" y="80" fill="#44474e" font-size="10" font-weight="500">PKV</text>
<line x1="95" y1="76" x2="115" y2="76" stroke="#6B7280" stroke-width="2.5" stroke-linecap="round"/>
<text x="120" y="80" fill="#44474e" font-size="10" font-weight="500">GKV*</text>

<!-- Grid -->
<line x1="40" y1="530" x2="370" y2="530" stroke="#CBD5E1" stroke-width="1"/>
<text x="34" y="534" fill="#9CA3AF" font-size="9" text-anchor="end">100</text>
