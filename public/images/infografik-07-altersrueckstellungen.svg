<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 460" width="920" height="460">
<defs><style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap');
text { font-family: 'Inter', system-ui, sans-serif; }
</style></defs>
<rect width="920" height="460" rx="12" fill="#FFFFFF"/>
<text x="460" y="42" fill="#002046" font-size="20" font-weight="700" text-anchor="middle">Altersrückstellungen in der PKV</text>
<text x="460" y="64" fill="#44474e" font-size="13" text-anchor="middle">So bleibt dein Beitrag im Alter bezahlbar</text>

<!-- Phase 1 -->
<rect x="67" y="85" width="250" height="260" rx="10" fill="#f3f4f5"/>
<text x="192" y="125" fill="#002046" font-size="15" font-weight="700" text-anchor="middle">Einstieg (25 bis 45)</text>
<rect x="87" y="150" width="150" height="28" rx="4" fill="#D4A017"/>
<text x="162" y="169" fill="white" font-size="11" font-weight="600" text-anchor="middle">70 % Leistung</text>
<rect x="241" y="150" width="87" height="28" rx="4" fill="#1b365d"/>
<text x="284" y="169" fill="white" font-size="11" font-weight="600" text-anchor="middle">30 % Sparen</text>
<text x="192" y="215" fill="#44474e" font-size="12" text-anchor="middle">30 % jeder Prämie bilden</text>
<text x="192" y="233" fill="#44474e" font-size="12" text-anchor="middle">dein persönliches Polster</text>

<!-- Arrow 1 -->
<text x="326" y="215" fill="#D4A017" font-size="28" text-anchor="middle">→</text>

<!-- Phase 2 -->
<rect x="335" y="85" width="250" height="260" rx="10" fill="#f3f4f5"/>
<text x="460" y="125" fill="#002046" font-size="15" font-weight="700" text-anchor="middle">Aufbau (45 bis 60)</text>
<text x="460" y="185" fill="#D4A017" font-size="34" font-weight="800" text-anchor="middle">38.800 €</text>
<text x="460" y="213" fill="#44474e" font-size="13" font-weight="600" text-anchor="middle">Rückstellungen pro Kopf</text>
<text x="460" y="240" fill="#44474e" font-size="12" text-anchor="middle">Kapital wächst durch Zinsen</text>

<!-- Arrow 2 -->
<text x="594" y="215" fill="#D4A017" font-size="28" text-anchor="middle">→</text>

<!-- Phase 3 -->
<rect x="603" y="85" width="250" height="260" rx="10" fill="#f3f4f5"/>
<text x="728" y="125" fill="#002046" font-size="15" font-weight="700" text-anchor="middle">Ruhestand (ab 65)</text>
<text x="728" y="185" fill="#00261c" font-size="15" font-weight="700" text-anchor="middle">Rückstellungen federn</text>
<text x="728" y="207" fill="#00261c" font-size="15" font-weight="700" text-anchor="middle">Kostensteigerung ab</text>
<text x="728" y="240" fill="#44474e" font-size="12" text-anchor="middle">Beitrag sinkt, Zuschlag entfällt</text>

</svg>