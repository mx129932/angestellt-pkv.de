<text x="200" y="488" fill="#44474e" font-size="13" font-weight="600" text-anchor="middle">Finanzreserven</text>

<text x="112" y="545" fill="#44474e" font-size="20" font-weight="800" text-anchor="middle">28 €</text>
<text x="112" y="565" fill="#74777f" font-size="11" text-anchor="middle">pro Versichertem</text>
<text x="288" y="545" fill="#ba1a1a" font-size="20" font-weight="800" text-anchor="middle">3 Tage</text>
<text x="288" y="565" fill="#74777f" font-size="11" text-anchor="middle">Reichweite</text>

</svg>