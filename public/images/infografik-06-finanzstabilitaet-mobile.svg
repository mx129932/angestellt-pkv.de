<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 720" width="400" height="720">
<defs><style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap');
text { font-family: 'Inter', system-ui, sans-serif; }
</style></defs>
<rect width="400" height="720" rx="12" fill="#FFFFFF"/>
<text x="200" y="36" fill="#002046" font-size="18" font-weight="700" text-anchor="middle">Finanzielle Stabilität</text>

<!-- PKV card -->
<rect x="24" y="80" width="352" height="260" rx="10" fill="#f3f4f5"/>
<text x="200" y="115" fill="#002046" font-size="14" font-weight="700" text-anchor="middle">Private Krankenversicherung</text>
<text x="200" y="170" fill="#D4A017" font-size="44" font-weight="800" text-anchor="middle">351 Mrd. €</text>
<text x="200" y="198" fill="#44474e" font-size="13" font-weight="600" text-anchor="middle">Alterungsrückstellungen</text>

<text x="112" y="255" fill="#002046" font-size="20" font-weight="800" text-anchor="middle">38.800 €</text>
<text x="112" y="275" fill="#74777f" font-size="11" text-anchor="middle">pro Versichertem</text>
<text x="288" y="255" fill="#002046" font-size="20" font-weight="800" text-anchor="middle">9 Jahre</text>
<text x="288" y="275" fill="#74777f" font-size="11" text-anchor="middle">Reichweite</text>

<!-- GKV card -->
<rect x="24" y="370" width="352" height="260" rx="10" fill="#f3f4f5"/>
<text x="200" y="405" fill="#74777f" font-size="14" font-weight="700" text-anchor="middle">Gesetzliche Krankenversicherung</text>
