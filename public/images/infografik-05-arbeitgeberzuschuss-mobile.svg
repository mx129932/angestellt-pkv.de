<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 720" width="400" height="720">
<defs><style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap');
text { font-family: 'Inter', system-ui, sans-serif; }
</style></defs>
<rect width="400" height="720" rx="12" fill="#FFFFFF"/>
<text x="200" y="36" fill="#002046" font-size="18" font-weight="700" text-anchor="middle">Arbeitgeberzuschuss zur PKV 2026</text>

<text x="200" y="170" fill="#D4A017" font-size="64" font-weight="800" text-anchor="middle">613 €</text>
<text x="200" y="205" fill="#44474e" font-size="15" font-weight="600" text-anchor="middle">maximaler Zuschuss pro Monat</text>

<!-- Box 1 -->
<rect x="40" y="270" width="320" height="72" rx="10" fill="#002046"/>
<text x="200" y="300" fill="white" font-size="14" font-weight="600" text-anchor="middle">Krankenversicherung</text>
<text x="200" y="324" fill="#D4A017" font-size="20" font-weight="800" text-anchor="middle">508,59 €</text>

<text x="200" y="368" fill="#74777f" font-size="20" text-anchor="middle">+</text>

<!-- Box 2 -->
<rect x="40" y="390" width="320" height="72" rx="10" fill="#1b365d"/>
<text x="200" y="420" fill="white" font-size="14" font-weight="600" text-anchor="middle">Pflegeversicherung</text>
<text x="200" y="444" fill="#D4A017" font-size="20" font-weight="800" text-anchor="middle">104,63 €</text>

<text x="200" y="520" fill="#44474e" font-size="12" text-anchor="middle">Dein Arbeitgeber zahlt bis zu</text>
<text x="200" y="537" fill="#44474e" font-size="12" text-anchor="middle">50 % deines PKV-Beitrags.</text>

</svg>