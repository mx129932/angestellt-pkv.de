  <line x1="55" y1="319.2" x2="860" y2="319.2" stroke="#E5E7EB" stroke-width="0.7"/>
  <text x="47" y="323.2" fill="#9CA3AF" font-size="10.5" text-anchor="end">140</text>
  <line x1="55" y1="266.9" x2="860" y2="266.9" stroke="#E5E7EB" stroke-width="0.7"/>
  <text x="47" y="270.9" fill="#9CA3AF" font-size="10.5" text-anchor="end">160</text>
