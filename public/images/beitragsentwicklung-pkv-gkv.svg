<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" width="960" height="520">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    </style>
    <linearGradient id="pkv-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A017" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#D4A017" stop-opacity="0.01"/>
    </linearGradient>
    <linearGradient id="gkv-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B7280" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#6B7280" stop-opacity="0.01"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.06"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="960" height="520" rx="12" fill="#FFFFFF"/>


  <!-- Title -->
  <text x="55" y="38" fill="#002046" font-size="22" font-weight="700" letter-spacing="-0.3">Beitragsentwicklung PKV vs. GKV</text>
  <text x="55" y="58" fill="#44474e" font-size="12.5" font-weight="400">Indexierte Prämien- und Beitragsbelastung je Versicherten (2005 = 100)</text>


