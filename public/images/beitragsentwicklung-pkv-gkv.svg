  <path d="M55.0,423.8 L95.2,415.0 L135.5,405.8 L175.8,396.1 L216.0,386.4 L256.2,376.2 L296.5,365.5 L336.8,354.8 L377.0,343.6 L417.2,331.8 L457.5,319.8 L497.8,304.6 L538.0,288.9 L578.2,272.7 L618.5,255.7 L658.8,237.9 L699.0,219.6 L739.2,200.5 L779.5,180.4 L819.8,159.7 L860.0,138.0" fill="none" stroke="#6B7280" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M55.0,423.8 L95.2,418.1 L135.5,412.1 L175.8,405.8 L216.0,399.5 L256.2,393.2 L296.5,386.7 L336.8,379.9 L377.0,373.1 L417.2,366.0 L457.5,359.0 L497.8,346.2 L538.0,332.8 L578.2,319.0 L618.5,304.6 L658.8,289.7 L699.0,274.0 L739.2,257.8 L779.5,241.0 L819.8,223.5 L860.0,205.5" fill="none" stroke="#D4A017" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="860.0" cy="138.0" r="4.5" fill="#6B7280" stroke="white" stroke-width="2"/>
  <circle cx="860.0" cy="205.5" r="4.5" fill="#D4A017" stroke="white" stroke-width="2"/>
  <circle cx="55.0" cy="423.8" r="3.5" fill="#D4A017" stroke="white" stroke-width="1.5"/>
  <circle cx="55.0" cy="423.8" r="3.5" fill="#6B7280" stroke="white" stroke-width="1.5"/>

  <!-- GKV rate label (positioned above GKV line around 2013) -->
  <rect x="280" y="300" width="194" height="36" rx="6" fill="#F0F1F3" stroke="#D1D5DB" stroke-width="0.7" filter="url(#shadow)"/>
  <text x="377" y="324" fill="#6B7280" font-size="13" font-weight="700" text-anchor="middle">GKV: ⌀ 3,8 % <tspan font-size="10.5" font-weight="500" fill="#44474e">pro Jahr</tspan></text>

  <!-- PKV rate label (positioned above PKV line around 2019) -->
  <rect x="523" y="275" width="190" height="36" rx="6" fill="#FDF6E3" stroke="#E5D9B8" stroke-width="0.7" filter="url(#shadow)"/>
  <text x="618" y="299" fill="#B8860B" font-size="13" font-weight="700" text-anchor="middle">PKV: ⌀ 3,1 % <tspan font-size="10.5" font-weight="500" fill="#44474e">pro Jahr</tspan></text>


  <text x="865.0" y="142.0" fill="#6B7280" font-size="13" font-weight="700">209.3</text>
  <text x="865.0" y="209.5" fill="#B8860B" font-size="13" font-weight="700">183.5</text>


  <text x="55" y="500" fill="#9CA3AF" font-size="9.5">*ohne Bundeszuschuss</text>
  <text x="55" y="512" fill="#9CA3AF" font-size="9.5">Quelle: WIP-Kurzanalyse 2024 (BMG, BAS, GBE, PKV-Verband). 2024/2025 extrapoliert.</text>

</svg>