<text x="47" y="288" fill="#9CA3AF" font-size="10" text-anchor="end">140</text>
<line x1="55" y1="236" x2="860" y2="236" stroke="#E5E7EB" stroke-width="0.7"/>
<text x="47" y="240" fill="#9CA3AF" font-size="10" text-anchor="end">160</text>
<line x1="55" y1="188" x2="860" y2="188" stroke="#E5E7EB" stroke-width="0.7"/>
<text x="47" y="192" fill="#9CA3AF" font-size="10" text-anchor="end">180</text>
