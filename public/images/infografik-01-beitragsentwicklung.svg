<!-- GKV line -->
<path d="M55,380 L95,372 L136,363 L176,355 L216,346 L256,336 L296,327 L337,317 L377,306 L417,295 L458,284 L498,271 L538,256 L578,241 L618,226 L659,209 L699,192 L739,175 L780,156 L820,137 L860,117" fill="none" stroke="#6B7280" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

<!-- PKV line -->
<path d="M55,380 L95,375 L136,369 L176,364 L216,358 L256,352 L296,346 L337,340 L377,333 L417,327 L458,320 L498,309 L538,296 L578,284 L618,271 L659,257 L699,243 L739,228 L780,212 L820,196 L860,180" fill="none" stroke="#D4A017" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

<!-- End dots -->
<circle cx="860" cy="117" r="4" fill="#6B7280" stroke="white" stroke-width="2"/>
<circle cx="860" cy="180" r="4" fill="#D4A017" stroke="white" stroke-width="2"/>

<!-- Rate labels -->
<rect x="270" y="262" width="180" height="32" rx="6" fill="#F0F1F3" stroke="#D1D5DB" stroke-width="0.7" filter="url(#shadow)"/>
<text x="360" y="283" fill="#6B7280" font-size="12" font-weight="700" text-anchor="middle">GKV: ⌀ 3,8 % pro Jahr</text>

<rect x="510" y="238" width="176" height="32" rx="6" fill="#FDF6E3" stroke="#E5D9B8" stroke-width="0.7" filter="url(#shadow)"/>
<text x="598" y="259" fill="#B8860B" font-size="12" font-weight="700" text-anchor="middle">PKV: ⌀ 3,1 % pro Jahr</text>

<!-- End values -->
<text x="866" y="113" fill="#6B7280" font-size="12" font-weight="700">209,3</text>
<text x="866" y="194" fill="#B8860B" font-size="12" font-weight="700">183,5</text>

<!-- Footer -->
<text x="55" y="438" fill="#9CA3AF" font-size="9">*ohne Bundeszuschuss</text>
<text x="55" y="450" fill="#9CA3AF" font-size="9">Quelle: WIP-Kurzanalyse 2024 (BMG, BAS, GBE, PKV-Verband). 2024/2025 extrapoliert.</text>

</svg>