<!-- Area fills -->
<path d="M55,380 L95,372 L136,363 L176,355 L216,346 L256,336 L296,327 L337,317 L377,306 L417,295 L458,284 L498,271 L538,256 L578,241 L618,226 L659,209 L699,192 L739,175 L780,156 L820,137 L860,117 L860,395 L55,395 Z" fill="url(#gkv-fill)"/>
