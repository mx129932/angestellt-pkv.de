<text x="47" y="144" fill="#9CA3AF" font-size="10" text-anchor="end">200</text>
<line x1="55" y1="92" x2="860" y2="92" stroke="#E5E7EB" stroke-width="0.7"/>
<text x="47" y="96" fill="#9CA3AF" font-size="10" text-anchor="end">220</text>

<!-- X axis labels -->
<text x="55" y="410" fill="#9CA3AF" font-size="11" font-weight="500" text-anchor="middle">2005</text>
<line x1="55" y1="92" x2="55" y2="395" stroke="#E5E7EB" stroke-width="0.5" stroke-dasharray="4,4"/>
<text x="256" y="410" fill="#9CA3AF" font-size="11" font-weight="500" text-anchor="middle">2010</text>
